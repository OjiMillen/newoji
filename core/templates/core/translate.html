<style>
/* --- GOD MODE WhatsApp Float --- */
.whatsapp-float {
  position: fixed;
  bottom: 20px;
  left: 20px;
  background: linear-gradient(135deg, #25d366, #128c7e);
  color: white;
  border-radius: 50px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 12px 18px;
  box-shadow: 0 6px 18px rgba(0,0,0,0.25);
  font-family: "Segoe UI", Roboto, Arial, sans-serif;
  z-index: 9999;
  cursor: pointer;
  animation: slideBounce 0.9s ease forwards;
  transition: opacity 0.6s ease, transform 0.6s ease;
}

.whatsapp-float.hide {
  opacity: 0;
  transform: translateY(50px);
  pointer-events: none;
}

.whatsapp-float .whatsapp-link {
  display: flex;
  align-items: center;
  text-decoration: none;
  color: white;
  font-weight: 600;
  letter-spacing: 0.3px;
}

.whatsapp-float .fa-whatsapp {
  font-size: 24px;
  margin-right: 10px;
  animation: pulseGlow 1.8s infinite;
}

.whatsapp-float .wa-text {
  font-size: 15px;
  white-space: nowrap;
}

.whatsapp-float .wa-close {
  margin-left: 12px;
  font-size: 20px;
  cursor: pointer;
  color: rgba(255,255,255,0.9);
  transition: color 0.3s;
}
.whatsapp-float .wa-close:hover {
  color: #ffdddd;
}

/* --- Animations --- */
@keyframes slideBounce {
  0% { transform: translateX(-150%); opacity: 0; }
  60% { transform: translateX(15px); opacity: 1; }
  80% { transform: translateX(-5px); }
  100% { transform: translateX(0); }
}
@keyframes pulseGlow {
  0% { transform: scale(1); text-shadow: 0 0 4px rgba(255,255,255,0.4); }
  50% { transform: scale(1.2); text-shadow: 0 0 12px rgba(255,255,255,0.8); }
  100% { transform: scale(1); text-shadow: 0 0 4px rgba(255,255,255,0.4); }
}

/* --- Responsive --- */
@media (max-width: 600px) {
  .whatsapp-float {
    padding: 10px 14px;
    border-radius: 40px;
  }
  .whatsapp-float .wa-text {
    display: none; /* icon only on phones */
  }
}
</style>

<script>
// --- Cookie Helper ---
function setCookie(name, value, seconds) {
  let expires = "";
  if (seconds) {
    let date = new Date();
    date.setTime(date.getTime() + (seconds*1000));
    expires = "; expires=" + date.toUTCString();
  }
  document.cookie = name + "=" + (value || "") + expires + "; path=/";
}
function getCookie(name) {
  let nameEQ = name + "=";
  let ca = document.cookie.split(';');
  for(let i=0;i < ca.length;i++) {
    let c = ca[i];
    while (c.charAt(0)==' ') c = c.substring(1,c.length);
    if (c.indexOf(nameEQ) == 0) return c.substring(nameEQ.length,c.length);
  }
  return null;
}

// --- Main Logic ---
document.addEventListener("DOMContentLoaded", function() {
  const floatBox = document.getElementById("whatsapp-float");
  const closeBtn = document.querySelector(".wa-close");
  const hideSeconds = 40; // adjust time here

  // Show only if not dismissed before
  if (!getCookie("waDismissed")) {
    floatBox.style.display = "flex";

    // Auto-hide after timer
    setTimeout(() => {
      floatBox.classList.add("hide");
      setCookie("waDismissed", "true", hideSeconds);
    }, hideSeconds * 1000);
  } else {
    floatBox.style.display = "none";
  }

  // Manual dismiss
  closeBtn.addEventListener("click", function() {
    floatBox.classList.add("hide");
    setCookie("waDismissed", "true", hideSeconds);
  });
});
</script>
